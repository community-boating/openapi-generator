openapi: 3.0.0
info:
  version: '1'
  title: ''
  description: ''
paths: {}
components:
  securitySchemes: {}
  schemas:
    Catalog:
      x-has-dao: true
      required: [assignId]
      allOf:
        - $ref: './shared.yaml#/components/schemas/CatalogInternalFull'
        - $ref: './shared.yaml#/components/schemas/DBHistory'
        - type: object
          properties:
            items:
              x-parent-variable: catalogId
              #x-column-parent-fk: line
              type: array
              items:
                $ref: '#/components/schemas/Item'
            taxes:
              x-parent-variable: catalogId
              type: array
              items:
                $ref: '#/components/schemas/Tax'
            categories:
              x-parent-variable: catalogId
              type: array
              items:
                $ref: '#/components/schemas/Category'
            discounts:
              x-parent-variable: catalogId
              type: array
              items:
                $ref: '#/components/schemas/Discount'
            products:
              x-parent-variable: catalogId
              type: array
              items:
                $ref: '#/components/schemas/Product'
            agreements:
              x-parent-variable: catalogId
              type: array
              items:
                $ref: '#/components/schemas/Agreement'
    Product:
      x-has-dao: true
      required: [assignId, productName, productDescription, active, catalogId]
      allOf:
        - $ref: './shared.yaml#/components/schemas/ProductInternal'
        - $ref: './shared.yaml#/components/schemas/DBHistory'
        - type: object
          properties:
            catalogId:
              $ref: '#/components/schemas/Catalog'

    Item:
      x-has-dao: true
      required: [assignId, type]
      allOf:
        - $ref: './shared.yaml#/components/schemas/ItemInternalFull'
        - $ref: './shared.yaml#/components/schemas/DBHistory'
        - type: object
          properties:
            classTypeId:
              $ref: '#/components/schemas/ApClassType'
            classInstanceId:
              $ref: '#/components/schemas/ApClassInstance'
            membershipTypeId:
              $ref: '#/components/schemas/MembershipType'
            productId:
              $ref: '#/components/schemas/Product'
            catalogId:
              $ref: '#/components/schemas/Catalog'
            itemInstances:
              x-parent-variable: itemId
              type: array
              items:
                $ref: '#/components/schemas/ItemInstance'
            itemCategories:
              x-parent-variable: item
              type: array
              items:
                $ref: '#/components/schemas/ItemCategory'
            itemDiscounts:
              x-parent-variable: itemId
              type: array
              items:
                $ref: '#/components/schemas/ItemDiscount'
            itemTaxes:
              x-parent-variable: itemId
              type: array
              items:
                $ref: '#/components/schemas/ItemTax'
            itemAgreements:
              x-parent-variable: itemId
              type: array
              items:
                $ref: '#/components/schemas/ItemAgreement'
    DiscountCategory:
      x-has-dao: true
      required: [assignId, discountId]
      allOf:
        - $ref: './shared.yaml#/components/schemas/DiscountCategoryFull'
        - $ref: './shared.yaml#/components/schemas/DBHistory'
        - type: object
          properties:
            discountId:
              $ref: '#/components/schemas/Discount'
            categoryId:
              $ref: '#/components/schemas/Category'


    ItemCategory:
      x-has-dao: true
      required: [assignId, item, categoryId]
      allOf:
        - $ref: './shared.yaml#/components/schemas/ItemCategoryInternalFull'
        - $ref: './shared.yaml#/components/schemas/DBHistory'
        - type: object
          properties:
            assignId:
              x-col-primary: true
              type: integer
              format: int64
            item:
              $ref: '#/components/schemas/Item'
            categoryId:
              $ref: '#/components/schemas/Category'

    Category:
      x-has-dao: true
      required: [assignId, categoryName, description, catalogId]
      allOf:
        - $ref: './shared.yaml#/components/schemas/CategoryInternal'
        - $ref: './shared.yaml#/components/schemas/DBHistory'
        - type: object
          properties:
            catalogId:
              $ref: '#/components/schemas/Catalog'

    ItemInstance:
      x-has-dao: true
      required: [assignId, itemId]
      allOf:
        - $ref: './shared.yaml#/components/schemas/ItemInstanceInternal'
        - $ref: './shared.yaml#/components/schemas/DBHistory'
        - type: object
          properties:
            itemId:
              $ref: '#/components/schemas/Item'

    ItemInstanceStockChange:
      x-has-dao: true
      required: [itemInstanceId, changeAmount, stockChangeType]
      allOf:
        - $ref: './shared.yaml#/components/schemas/ItemInstanceStockChangeFull'
        - $ref: './shared.yaml#/components/schemas/DBHistory'
        - type: object
          properties:
            itemInstanceId:
              $ref: '#/components/schemas/ItemInstance'

    LineItem:
      x-has-dao: true
      required: [assignId, orderId, itemInstanceId]
      allOf:
        - $ref: './shared.yaml#/components/schemas/LineItemInternalFull'
        - $ref: './shared.yaml#/components/schemas/DBHistory'
        - type: object
          properties:
            parentItemId:
              $ref: '#/components/schemas/LineItem'
            orderId:
              $ref: '#/components/schemas/OrderNew'
            itemInstanceId:
              $ref: '#/components/schemas/ItemInstance'
            subscriptionId:
              $ref: '#/components/schemas/PersonSubscription'
            classSignup:
              nullable: true
              $ref: '#/components/schemas/ApClassSignupDAO'
            membership:
              nullable: true
              $ref: '#/components/schemas/MembershipDAO'
            donation:
              nullable: true
              $ref: '#/components/schemas/DonationDAO'
            card:
              nullable: true
              $ref: '#/components/schemas/CardDAO'
            giftCard:
              nullable: true
              $ref: '#/components/schemas/BalanceTransaction'
            guestPrivs:
              nullable: true
              $ref: '#/components/schemas/GuestPrivsDAO'
            damageWaiver:
              nullable: true
              $ref: '#/components/schemas/DamageWaiver'
            stockChange:
              nullable: true
              $ref: '#/components/schemas/ItemInstanceStockChange'
            purchaseDelivery:
              $ref: '#/components/schemas/PurchaseDelivery'
            appliedTaxes:
              x-parent-variable: lineItemId
              type: array
              items:
                $ref: '#/components/schemas/LineItemTax'
            discounts:
              x-parent-variable: lineItemId
              type: array
              items:
                $ref: '#/components/schemas/LineItemDiscountInstance'
            refunds:
              x-parent-variable: lineItemId
              type: array
              items:
                $ref: '#/components/schemas/LineItemRefund'
    PurchaseDelivery:
      x-has-dao: true
      allOf:
        - $ref: './shared.yaml#/components/schemas/PurchaseDeliveryFull'
        - type: object
          properties:
            targetPerson:
              $ref: '#/components/schemas/PersonDAO'
            targetAddress:
              $ref: '#/components/schemas/AddressDAO'
            personLookup:
              $ref: '#/components/schemas/PersonLookup'
    LineItemRefund:
      x-has-dao: true
      required: [assignId, lineItemId]
      allOf:
        - $ref: './shared.yaml#/components/schemas/LineItemRefundInternalFull'
        - $ref: './shared.yaml#/components/schemas/DBHistory'
        - type: object
          properties:
            lineItemId:
              $ref: '#/components/schemas/LineItem'
            stockChangeId:
              $ref: '#/components/schemas/ItemInstanceStockChange'
            taxes:
              x-parent-variable: lineItemRefundId
              type: array
              items:
                $ref: '#/components/schemas/LineItemRefundTax'
    LineItemRefundTax:
      x-has-dao: true
      required: [taxId]
      allOf:
        - $ref: './shared.yaml#/components/schemas/LineItemRefundTaxInternalFull'
        - $ref: './shared.yaml#/components/schemas/DBHistory'
        - type: object
          properties:
            lineItemRefundId:
              $ref: '#/components/schemas/LineItemRefund'
            taxId:
              $ref: '#/components/schemas/LineItemTax'

    ItemTax:
      x-has-dao: true
      required: [assignId, itemId, taxId]
      allOf:
        - $ref: './shared.yaml#/components/schemas/ItemTaxInternal'
        - $ref: './shared.yaml#/components/schemas/DBHistory'
        - type: object
          properties:
            itemId:
              $ref: '#/components/schemas/Item'
            taxId:
              $ref: '#/components/schemas/Tax'

    Tax:
      x-has-dao: true
      required: [assignId, taxName, taxRate, catalogId]
      allOf:
        - $ref: './shared.yaml#/components/schemas/TaxInternal'
        - $ref: './shared.yaml#/components/schemas/DBHistory'
        - type: object
          properties:
            catalogId:
              $ref: '#/components/schemas/Catalog'

    LineItemTax:
      x-has-dao: true
      x-no-interface: true
      required: [assignId, taxId, lineItemId]
      allOf:
        - $ref: './shared.yaml#/components/schemas/LineItemTaxInternal'
        - $ref: './shared.yaml#/components/schemas/DBHistory'
        - type: object
          properties:
            taxId:
              $ref: '#/components/schemas/Tax'
            lineItemId:
              $ref: '#/components/schemas/LineItem'

    LineItemDiscountInstance:
      x-has-dao: true
      required: [assignId, lineItemId, discountInstanceId, discountType]
      allOf:
        - $ref: './shared.yaml#/components/schemas/LineItemDiscountInstanceInternalFull'
        - $ref: './shared.yaml#/components/schemas/DBHistory'
        - type: object
          properties:
            lineItemId:
              $ref: '#/components/schemas/LineItem'
            discountInstanceId:
              $ref: '#/components/schemas/DiscountInstance'

    OrderNew:
      x-has-dao: true
      allOf:
        - $ref: './shared.yaml#/components/schemas/OrderFull'
        - $ref: './shared.yaml#/components/schemas/DBHistory'
        - type: object
          required: [assignId, status, version]
          properties:
            personId:
              $ref: '#/components/schemas/PersonDAO'
            lineItems:
              x-parent-variable: orderId
              items:
                $ref: '#/components/schemas/LineItem'
            orderPayments:
              x-parent-variable: orderId
              items:
                $ref: '#/components/schemas/OrderPayment'
            user:
              $ref: '#/components/schemas/UserDAO'

    ItemDiscount:
      x-has-dao: true
      required: [assignId, itemId, discountId]
      allOf:
        - $ref: './shared.yaml#/components/schemas/ItemDiscountInternal'
        - $ref: './shared.yaml#/components/schemas/DBHistory'
        - type: object
          properties:
            itemId:
              $ref: '#/components/schemas/Item'
            discountId:
              $ref: '#/components/schemas/Discount'
    PaymentSource:
      x-has-dao: true
      required: [ assignId, orderId, paymentSource, paymentAmountCents, paymentStatus ]
      allOf:
        - $ref: './shared.yaml#/components/schemas/PaymentSourceFull'
        - $ref: './shared.yaml#/components/schemas/DBHistory'
        - type: object
          properties:
            personId:
              $ref: '#/components/schemas/PersonDAO'
            balanceSource:
              $ref: '#/components/schemas/Balance'

    OrderPayment:
      x-has-interface: true
      x-no-interface: true
      x-has-dao: true
      required: [assignId, orderId, paymentAmountCents, paymentStatus]
      allOf:
        - $ref: './shared.yaml#/components/schemas/OrderPaymentInternalFull'
        - $ref: './shared.yaml#/components/schemas/DBHistory'
        - type: object
          properties:
            orderId:
              $ref: '#/components/schemas/OrderNew'
            paymentSource:
              $ref: '#/components/schemas/PaymentSource'
            stripeTransaction:
              $ref: '#/components/schemas/StripeTransaction'
            cashTransaction:
              $ref: '#/components/schemas/CashTransaction'
            balanceTransaction:
              $ref: '#/components/schemas/BalanceTransaction'
            transactionOther:
              $ref: '#/components/schemas/TransactionOther'

    CustomPaymentMethodMapping:
      x-has-dao: true
      required: [assignId, paymentType, customPaymentMethodId]
      allOf:
        - $ref: './shared.yaml#/components/schemas/CustomPaymentMethodMappingBase'
        - $ref: './shared.yaml#/components/schemas/LongIDResource'
        - $ref: './shared.yaml#/components/schemas/DBHistory'
    ReportMetaDAO:
      x-has-dao: true
      type: object
      required: [ key, title ]
      allOf:
        - $ref: './shared.yaml#/components/schemas/ReportMetaFull'
        - type: object
          properties:
            report:
              $ref: '#/components/schemas/ReportDAO'
    ReportDAO:
      x-has-dao: true
      type: object
      required: [ reportKey, reportId ]
      allOf:
        - $ref: './shared.yaml#/components/schemas/ReportFull'
        - type: object
          properties:
            childReports:
              type: array
              x-parent-variable: parentReport
              items:
                $ref: '#/components/schemas/ReportDAO'
            meta:
              type: array
              x-parent-variable: report
              items:
                $ref: '#/components/schemas/ReportMetaDAO'
            parentReport:
              $ref: '#/components/schemas/ReportDAO'
    BalanceTransaction:
      x-has-dao: true
      required: [assignId, balanceId, transactionAmountCents]
      allOf:
        - $ref: './shared.yaml#/components/schemas/BalanceTransactionInternalFull'
        - $ref: './shared.yaml#/components/schemas/DBHistory'
        - type: object
          properties:
            balanceId:
              $ref: '#/components/schemas/Balance'
            paymentId:
              x-backref-name: balanceTransaction
              allOf:
                - $ref: '#/components/schemas/OrderPayment'
            lineItemId:
              x-backref-name: giftCard
              allOf:
                - $ref: '#/components/schemas/LineItem'
    TransactionOther:
      x-has-dao: true
      required: [ assignId, checkNumber, checkAmount ]
      allOf:
        - $ref: './shared.yaml#/components/schemas/TransactionOtherFull'
        - $ref: './shared.yaml#/components/schemas/DBHistory'
    PersonBalance:
      x-has-dao: true
      allOf:
        - $ref: './shared.yaml#/components/schemas/PersonBalanceFull'
        - $ref: './shared.yaml#/components/schemas/DBHistory'
        - type: object
          properties:
            balanceId:
              $ref: '#/components/schemas/Balance'
            personId:
              $ref: '#/components/schemas/PersonDAO'
    Balance:
      x-has-dao: true
      required: [assignId, personId, balanceType]
      allOf:
        - $ref: './shared.yaml#/components/schemas/BalanceInternal'
        - $ref: './shared.yaml#/components/schemas/DBHistory'
        - type: object
          properties:
            personBalances:
              x-parent-variable: balanceId
              type: array
              items:
                $ref: '#/components/schemas/PersonBalance'
            balanceTransactions:
              x-parent-variable: balanceId
              type: array
              items:
                $ref: '#/components/schemas/BalanceTransaction'
    BalanceLookupCooldown:
      x-has-dao: true
      required: [assignId, personId, searchAttempt]
      allOf:
        - $ref: './shared.yaml#/components/schemas/LongIDResource'
        - $ref: './shared.yaml#/components/schemas/DBHistory'
        - type: object
          properties:
            personId:
              $ref: '#/components/schemas/PersonDAO'
            searchAttempt:
              type: string
              maxLength: 500
            balanceMatch:
              $ref: '#/components/schemas/Balance'
    StripeTransaction:
      x-has-dao: true
      required: [assignId, stripePaymentIntent, transactionAmountCents]
      allOf:
        - $ref: './shared.yaml#/components/schemas/StripeTransactionInternalFull'
        - $ref: './shared.yaml#/components/schemas/DBHistory'
        - type: object
          properties:
            payments:
              type: array
              x-parent-variable: stripeTransaction
              items:
                $ref: '#/components/schemas/OrderPayment'

    CashTransaction:
      x-has-dao: true
      required: [assignId, cashDrawerId, transactionAmountCents]
      allOf:
        - $ref: './shared.yaml#/components/schemas/CashTransactionInternalFull'
        - $ref: './shared.yaml#/components/schemas/DBHistory'
        - type: object
          properties:
            paymentId:
              $ref: '#/components/schemas/OrderPayment'
            cashDrawerChangeId:
              $ref: '#/components/schemas/CashDrawersChange'

    CashDrawersChange:
      x-has-dao: true
      allOf:
        - $ref: './shared.yaml#/components/schemas/CashDrawersChangeFull'
        - $ref: './shared.yaml#/components/schemas/DBHistory'
        - type: object
          properties:
            cashDrawerId:
              $ref: '#/components/schemas/CashDrawer'
    ApClassType:
      x-has-dao: true
      allOf:
        - $ref: './shared.yaml#/components/schemas/ApClassTypeFull'
        - type: object
          properties:
            ratingPrereq:
              $ref: '#/components/schemas/RatingDAO'
            ratingOverkill:
              $ref: '#/components/schemas/RatingDAO'
            classPrereq:
              $ref: '#/components/schemas/ApClassType'
            classOverkill:
              $ref: '#/components/schemas/ApClassType'
    ClassLocationDAO:
      x-has-dao: true
      allOf:
        - $ref: './shared.yaml#/components/schemas/ClassLocationFull'
    ApClassInstance:
      x-has-dao: true
      allOf:
        - $ref: './shared.yaml#/components/schemas/ApClassInstanceInternal'
        - type: object
          properties:
            sessions:
              x-parent-variable: instanceId
              type: array
              items:
                $ref: '#/components/schemas/ApClassSessionDAO'
            signups:
              x-parent-variable: instanceId
              type: array
              items:
                $ref: '#/components/schemas/ApClassSignupDAO'
            locationId:
              $ref: '#/components/schemas/ClassLocationDAO'
            formatId:
              $ref: '#/components/schemas/ApClassFormatDAO'
            typeId:
              $ref: '#/components/schemas/ApClassType'
    ApClassFormatDAO:
      x-has-dao: true
      allOf:
        - $ref: './shared.yaml#/components/schemas/ApClassFormatFull'
        - type: object
          properties:
            typeId:
              $ref: '#/components/schemas/ApClassType'
    ApClassSessionDAO:
      x-has-dao: true
      allOf:
        - $ref: './shared.yaml#/components/schemas/ApClassSessionInternal'
        - type: object
          properties:
            instanceId:
              $ref: '#/components/schemas/ApClassInstance'
            attendance:
              x-parent-variable: sessionId
              type: array
              items:
                $ref: '#/components/schemas/ApClassAttendanceDAO'
    ClassInstructorDAO:
      x-has-dao: true
      allOf:
        - $ref: './shared.yaml#/components/schemas/ClassInstructorFull'
    JpClassSectionDAO:
      x-has-dao: true
      allOf:
        - $ref: './shared.yaml#/components/schemas/JpClassSectionFull'
        - type: object
          properties:
            instanceId:
              $ref: '#/components/schemas/JpClassInstanceDAO'
            instructorId:
              $ref: '#/components/schemas/ClassInstructorDAO'
            locationId:
              $ref: '#/components/schemas/ClassLocationDAO'
            lookupId:
              $ref: '#/components/schemas/JpClassSectionLookupDAO'
    JpClassSectionLookupDAO:
      x-has-dao: true
      allOf:
        - $ref: './shared.yaml#/components/schemas/JpClassSectionLookupFull'
    JpClassStaggerDAO:
      x-has-dao: true
      allOf:
        - $ref: './shared.yaml#/components/schemas/JpClassStaggerFull'
        - type: object
          properties:
            instanceId:
              $ref: '#/components/schemas/JpClassInstanceDAO'
            signups:
              x-parent-variable: staggerId
              type: array
              items:
                $ref: '#/components/schemas/JpClassSignupDAO'
    JpClassTypeOverrideDAO:
      x-has-dao: true
      required: [assignId]
      allOf:
        - $ref: './shared.yaml#/components/schemas/UnifiedClassTypeOverrideBase'
        - $ref: './shared.yaml#/components/schemas/DBHistory'
        - type: object
          properties:
            assignId:
              x-col-primary: true
              x-dto-column: ROW_ID
              x-table-name: JP_CLASS_TYPE_OVERRIDES
              x-auto-increment: JP_CLASS_TYPE_OVERRIDES_PK
              type: integer
            personId:
              $ref: '#/components/schemas/PersonDAO'
            typeId:
              $ref: '#/components/schemas/JpClassTypeDAO'
            season:
              type: integer
            isForOverkill:
              type: boolean
              x-boolean-char: Y
    ApClassTypeOverrideDAO:
      x-has-dao: true
      required: [assignId]
      allOf:
        - $ref: './shared.yaml#/components/schemas/UnifiedClassTypeOverrideBase'
        - $ref: './shared.yaml#/components/schemas/DBHistory'
        - type: object
          properties:
            assignId:
              x-col-primary: true
              x-dto-column: ROW_ID
              x-table-name: AP_CLASS_TYPE_OVERRIDES
              x-auto-increment: AP_CLASS_TYPE_OVERRIDES_PK
              type: integer
            personId:
              $ref: '#/components/schemas/PersonDAO'
            typeId:
              $ref: '#/components/schemas/ApClassType'
            season:
              type: integer
            isForOverkill:
              type: boolean
              x-boolean-char: Y


    JpClassTypeDAO:
      x-has-dao: true
      allOf:
        - $ref: './shared.yaml#/components/schemas/JpClassTypeFull'
        - type: object
          properties:
            ratingPrereq:
              $ref: '#/components/schemas/RatingDAO'
            ratingOverkill:
              $ref: '#/components/schemas/RatingDAO'
            classPrereq:
              $ref: '#/components/schemas/JpClassTypeDAO'
            classOverkill:
              $ref: '#/components/schemas/JpClassTypeDAO'
    JpClassInstanceDAO:
      x-has-dao: true
      allOf:
        - $ref: './shared.yaml#/components/schemas/JpClassInstanceInternal'
        - type: object
          properties:
            sessions:
              x-parent-variable: instanceId
              type: array
              items:
                $ref: '#/components/schemas/JpClassSessionDAO'
            sections:
              x-parent-variable: instanceId
              type: array
              items:
                $ref: '#/components/schemas/JpClassSectionDAO'
            staggers:
              x-parent-variable: instanceId
              type: array
              items:
                $ref: '#/components/schemas/JpClassStaggerDAO'
            signups:
              x-parent-variable: instanceId
              type: array
              items:
                $ref: '#/components/schemas/JpClassSignupDAO'
            locationId:
              $ref: '#/components/schemas/ClassLocationDAO'
            instructorId:
              $ref: '#/components/schemas/ClassInstructorDAO'
            typeId:
              $ref: '#/components/schemas/JpClassTypeDAO'
    JpClassSessionDAO:
      x-has-dao: true
      allOf:
        - $ref: './shared.yaml#/components/schemas/JpClassSessionInternal'
        - type: object
          properties:
            instanceId:
              $ref: '#/components/schemas/JpClassInstanceDAO'
            attendance:
              x-parent-variable: sessionId
              type: array
              items:
                $ref: '#/components/schemas/JpClassAttendanceDAO'
    JpClassAttendanceDAO:
      x-has-dao: true
      allOf:
        - $ref: './shared.yaml#/components/schemas/JpClassAttendanceFull'
        - type: object
          properties:
            sessionId:
              $ref: '#/components/schemas/JpClassSessionDAO'
            signupId:
              $ref: '#/components/schemas/JpClassSignupDAO'
    JpClassSignupDAO:
      x-has-dao: true
      allOf:
        - $ref: './shared.yaml#/components/schemas/JpClassSignupFull'
        - type: object
          properties:
            personId:
              $ref: '#/components/schemas/PersonDAO'
            instanceId:
              $ref: '#/components/schemas/JpClassInstanceDAO'
            sectionId:
              $ref: '#/components/schemas/JpClassSectionDAO'
            staggerId:
              $ref: '#/components/schemas/JpClassStaggerDAO'
            wlResult:
              x-backref-name: assignId
              allOf:
                - $ref: '#/components/schemas/JpClassWlResultDAO'
            attendance:
              x-parent-variable: signupId
              type: array
              items:
                $ref: '#/components/schemas/JpClassAttendanceDAO'
            membershipUsed:
              $ref: '#/components/schemas/MembershipDAO'
    JpClassWlResultDAO:
      x-has-dao: true
      required: [ assignId ]
      allOf:
        - $ref: './shared.yaml#/components/schemas/JpClassWlResultFull'
        - $ref: './shared.yaml#/components/schemas/DBHistory'
        - type: object
          properties:
            assignId:
              x-col-primary: true
              x-pk-type: Int
              x-dto-column: SIGNUP_ID
              x-table-name: JP_CLASS_WL_RESULTS
              allOf:
                - $ref: '#/components/schemas/JpClassSignupDAO'
    ApClassAttendanceDAO:
      x-has-dao: true
